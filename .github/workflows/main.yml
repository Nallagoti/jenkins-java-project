name: ci-jobs
on: push
jobs:
  ci-job:
    runs-on: ubuntu-22.04
    steps:
      - name: checkout
        uses: actions/checkout@v7
      - name: set up java
        uses: actions/checkout@v6
        with:
          distribution: 'temurin'
          java-version: '25'
          cache: 'maven'
          cache-dependency-path: 'sub-project/pom.xml' # optional
      - name: Build 
        run: mvn compile
      
      - name: test
        run: mvn test
      
      - name: artifact
        run: npm package
    
      
  
