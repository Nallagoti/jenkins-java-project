name: ci-jobs
on: push
jobs:
  ci-job:
    runs-on: ubuntu-22.04
    steps:
      - name: checkout code
        uses: actions/checkout@v4
      - name: set up java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
          cache: 'maven'
         
      - name: Build 
        run: mvn clean compile
      
      - name: test
        run: mvn test
      
      - name: artifact
        run: mvn package
    
      
  
